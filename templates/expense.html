{% extends 'base.html' %}
{% block title %}支出管理{% endblock %}
{% block page_title %}<i class="bi bi-credit-card-2-front me-2"></i>支出管理{% endblock %}
{% block content %}
<div class="row g-3">
  <div class="col-md-4">
    <div class="card">
      <div class="card-header"><i class="bi bi-plus-circle me-2"></i>录入支出</div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('expense_add') }}">
          <div class="mb-2">
            <label class="form-label small">日期</label>
            <input type="date" name="date" class="form-control form-control-sm" value="{{ today().strftime('%Y-%m-%d') }}">
          </div>
          <div class="mb-2">
            <label class="form-label small">支出类别</label>
            <select name="category" class="form-select form-select-sm" required>
              {% for c in categories %}
              <option>{{ c }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label small">金额</label>
            <input type="number" name="amount" class="form-control form-control-sm" step="0.01" required>
          </div>
          <div class="mb-2">
            <label class="form-label small">供应商</label>
            <input type="text" name="supplier" class="form-control form-control-sm">
          </div>
          <div class="mb-2">
            <label class="form-label small">付款方式</label>
            <select name="method" class="form-select form-select-sm">
              <option>银行转账</option><option>微信</option><option>支付宝</option><option>现金</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label small">备注</label>
            <input type="text" name="note" class="form-control form-control-sm">
          </div>
          <button type="submit" class="btn btn-danger btn-sm w-100 mt-2"><i class="bi bi-check2"></i> 保存</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-8">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span><i class="bi bi-list-ul me-2"></i>支出记录</span>
        <div class="d-flex gap-2">
          <select id="catFilter" class="form-select form-select-sm" style="width:120px">
            <option value="">全部分类</option>
            {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
          <input type="text" id="searchInput" class="form-control form-control-sm" style="width:140px" placeholder="搜索类别/供应商...">
          <span class="badge bg-danger rounded-pill d-flex align-items-center" id="recCount">0 笔</span>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive" style="max-height:480px;overflow-y:auto">
          <table class="table table-hover mb-0" id="expenseTable">
            <thead class="sticky-top bg-white"><tr>
              <th style="width:40px">#</th><th>日期</th><th>类别</th><th>金额</th><th>供应商</th><th>方式</th><th style="width:50px"></th>
            </tr></thead>
            <tbody id="expenseBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-body text-center py-4">
      <i class="bi bi-exclamation-triangle text-warning" style="font-size:2rem"></i>
      <p class="mt-2 mb-0">确认删除这条记录？</p>
    </div>
    <div class="modal-footer justify-content-center border-0 pt-0">
      <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button>
      <button class="btn btn-sm btn-danger" id="confirmDelete"><i class="bi bi-trash"></i> 删除</button>
    </div>
  </div></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let deleteIndex = -1;
const modal = new bootstrap.Modal(document.getElementById('confirmModal'));

function loadData() {
  const q = document.getElementById('searchInput').value;
  const cat = document.getElementById('catFilter').value;
  let url = '/api/expense/search?';
  if(q) url += 'q=' + encodeURIComponent(q) + '&';
  if(cat) url += 'cat=' + encodeURIComponent(cat);
  fetch(url).then(r=>r.json()).then(data => {
    const tbody = document.getElementById('expenseBody');
    document.getElementById('recCount').textContent = data.length + ' 笔';
    tbody.innerHTML = data.map((d,i) => `<tr>
      <td class="text-muted small">${i+1}</td>
      <td>${d.date ? (d.date.substring ? d.date.substring(0,10) : String(d.date).substring(0,10)) : ''}</td>
      <td><span class="badge bg-light text-dark">${d.category||''}</span></td>
      <td class="text-money text-danger">¥ ${(d.amount||0).toLocaleString('zh-CN', {minimumFractionDigits:2})}</td>
      <td>${d.supplier||''}</td>
      <td>${d.method||''}</td>
      <td><button class="btn btn-outline-danger btn-sm py-0 px-1" onclick="del(${i})"><i class="bi bi-trash"></i></button></td>
    </tr>`).join('');
  });
}

function del(idx) { deleteIndex = idx; modal.show(); }
document.getElementById('confirmDelete').onclick = function() {
  fetch('/api/expense/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({index:deleteIndex})})
    .then(r=>r.json()).then(d=>{ if(d.ok) { modal.hide(); loadData(); } });
};

let searchTimer;
document.getElementById('searchInput').oninput = function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadData, 300);
};
document.getElementById('catFilter').onchange = loadData;

loadData();
</script>
{% endblock %}
