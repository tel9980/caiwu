{% extends 'base.html' %}
{% block title %}数据备份{% endblock %}
{% block page_title %}<i class="bi bi-cloud-arrow-up me-2"></i>数据备份与恢复{% endblock %}
{% block content %}
<div class="row g-3 mb-3">
  <div class="col-md-4">
    <div class="card">
      <div class="card-header"><i class="bi bi-hdd-stack me-2"></i>创建备份</div>
      <div class="card-body text-center py-4">
        <i class="bi bi-archive text-primary" style="font-size:3rem"></i>
        <p class="mt-3 text-muted small">将当前数据文件备份到 <code>财务数据/backups/</code></p>
        <button class="btn btn-primary" id="btnBackup"><i class="bi bi-cloud-plus"></i> 立即备份</button>
        <div id="backupResult" class="mt-2 small"></div>
      </div>
    </div>
  </div>

  <div class="col-md-8">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span><i class="bi bi-list-ul me-2"></i>备份列表</span>
        <span class="badge bg-primary rounded-pill d-flex align-items-center" id="bkCount">0 个</span>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive" style="max-height:480px;overflow-y:auto">
          <table class="table table-hover table-sm mb-0">
            <thead class="sticky-top bg-white"><tr>
              <th>文件名</th>
              <th style="width:100px">大小</th>
              <th style="width:160px">备份时间</th>
              <th style="width:130px">操作</th>
            </tr></thead>
            <tbody id="bkBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-body text-center py-4">
      <i class="bi bi-exclamation-triangle text-warning" style="font-size:2rem"></i>
      <p class="mt-2 mb-0" id="confirmMsg">确认恢复此备份？</p>
      <p class="small text-danger mt-1 mb-0">当前数据将被覆盖，操作不可撤销！</p>
    </div>
    <div class="modal-footer justify-content-center border-0 pt-0">
      <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button>
      <button class="btn btn-sm btn-danger" id="confirmRestore"><i class="bi bi-arrow-clockwise"></i> 恢复</button>
    </div>
  </div></div>
</div>

<div class="modal fade" id="restoreSuccessModal" tabindex="-1">
  <div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-body text-center py-4">
      <i class="bi bi-check-circle text-success" style="font-size:2rem"></i>
      <p class="mt-2 mb-0 fw-bold">恢复成功！</p>
      <p class="small text-muted mt-1 mb-0">请在 <a href="{{ url_for('dashboard') }}">仪表盘</a> 查看数据</p>
    </div>
    <div class="modal-footer justify-content-center border-0 pt-0">
      <button class="btn btn-sm btn-primary" data-bs-dismiss="modal" onclick="window.location.reload()">确定</button>
    </div>
  </div></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const confirmModal = new bootstrap.Modal(document.getElementById('confirmModal'));
const successModal = new bootstrap.Modal(document.getElementById('restoreSuccessModal'));
let restoreName = '';

function loadList() {
  fetch('/api/backup/list').then(r=>r.json()).then(files => {
    document.getElementById('bkCount').textContent = files.length + ' 个';
    document.getElementById('bkBody').innerHTML = files.map(f => `<tr>
      <td><code>${f.name}</code></td>
      <td class="text-muted small">${f.size_str}</td>
      <td class="small">${f.mtime}</td>
      <td>
        <button class="btn btn-outline-success btn-sm py-0 px-2" onclick="restore('${f.name}')"><i class="bi bi-arrow-clockwise"></i> 恢复</button>
        <button class="btn btn-outline-danger btn-sm py-0 px-2" onclick="del('${f.name}')"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
  });
}

function restore(name) {
  restoreName = name;
  document.getElementById('confirmMsg').textContent = `确认恢复到备份 "${name}"？`;
  confirmModal.show();
}

document.getElementById('confirmRestore').onclick = function() {
  const btn = this; btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 恢复中...';
  fetch('/api/backup/restore', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:restoreName})})
    .then(r=>r.json()).then(d => {
      btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> 恢复';
      confirmModal.hide();
      if(d.ok) {
        successModal.show();
      } else {
        alert('恢复失败：' + (d.error||'未知错误'));
      }
    });
};

function del(name) {
  if(!confirm(`确认删除备份 "${name}"？`)) return;
  fetch('/api/backup/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:name})})
    .then(r=>r.json()).then(d => { if(d.ok) loadList(); else alert(d.error||'删除失败'); });
}

document.getElementById('btnBackup').onclick = function() {
  const btn = this; btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 备份中...';
  document.getElementById('backupResult').innerHTML = '';
  fetch('/api/backup/create', {method:'POST'})
    .then(r=>r.json()).then(d => {
      btn.disabled = false; btn.innerHTML = '<i class="bi bi-cloud-plus"></i> 立即备份';
      if(d.ok) {
        document.getElementById('backupResult').innerHTML = `<span class="text-success"><i class="bi bi-check-circle"></i> 备份成功：${d.file}</span>`;
        loadList();
      } else {
        document.getElementById('backupResult').innerHTML = `<span class="text-danger"><i class="bi bi-x-circle"></i> ${d.error||'备份失败'}</span>`;
      }
    });
};

loadList();
</script>
{% endblock %}
